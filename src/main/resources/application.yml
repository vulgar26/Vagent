# =============================================================================
# Vagent 应用配置（M0–M5 + U1–U5；详见 docs/Mx-实现说明.md、docs/U1-实现说明.md 等）
# =============================================================================
# 本地 PostgreSQL 库名默认 **vagent**（勿与 travel-ai 的 ragent 混用）；测试用 test profile + H2，不依赖本机 PG。

server:
  port: 8080

logging:
  pattern:
    # U4：控制台日志带 MDC traceId（由 TraceIdMdcFilter 注入）
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%X{traceId:-}] %logger{36} - %m%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

spring:
  datasource:
    # stringtype=unspecified：INSERT 时 String 主键可隐式 cast 到 PG uuid（MP 对 @TableId 可能不走 @TableField typeHandler）
    url: jdbc:postgresql://127.0.0.1:5432/vagent?stringtype=unspecified
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      # 生产与本地 PG：DDL 由 Flyway 执行；勿与 migration 重复跑 spring.sql.init
      mode: never

mybatis-plus:
  # 仅 UuidNativeTypeHandler（UUID↔uuid）。UuidStringTypeHandler 在 persistence 包，勿列入
  type-handlers-package: com.vagent.mybatis.typehandler
  configuration:
    map-underscore-to-camel-case: true

vagent:
  guardrails:
    reflection:
      # Day7：一次性门控（引用闭环 / 低置信长度）；默认关闭以保持与旧 eval 基线一致
      enabled: ${VAGENT_GUARDRAILS_REFLECTION_ENABLED:false}
      max-answer-chars-when-low-confidence: 500
    quote-only:
      # 与 POST /api/v1/eval/chat 的 quote_only 请求字段配合；默认关闭。档位语义见 plans/quote-only-guardrails.md
      enabled: ${VAGENT_GUARDRAILS_QUOTE_ONLY_ENABLED:false}
      strictness: ${VAGENT_GUARDRAILS_QUOTE_ONLY_STRICTNESS:moderate}
      # digits_only | digits_plus_tokens | digits_plus_tokens_plus_evidence；与 strictness 组合，默认与历史行为一致
      scope: ${VAGENT_GUARDRAILS_QUOTE_ONLY_SCOPE:digits_plus_tokens}
      # 为 true 时：主对话 SSE 在 RAG 有命中时缓冲 LLM 全文后再发 meta+chunk，以应用 quote-only（默认 false）
      apply-to-sse-stream: ${VAGENT_GUARDRAILS_QUOTE_ONLY_APPLY_TO_SSE_STREAM:false}
  eval:
    api:
      # P0：评测接口安全边界（默认关闭；disabled 时 /api/v1/eval/** 返回 404）
      enabled: false
      # 逗号分隔：X-Eval-Token 的 SHA-256(hex)；勿存明文。示例：echo -n "token" | sha256sum
      token-hash: ${VAGENT_EVAL_API_TOKEN_HASH:}
      # 仅当为 true 且 body mode=EVAL_DEBUG 时，meta 才允许出现明文 retrieval_hit_ids[]；生产务必 false
      debug-enabled: ${VAGENT_EVAL_API_DEBUG_ENABLED:false}
      # 非空时：仅当客户端 IP 落入下列某一 CIDR 时才输出明文 retrieval_hit_ids[]（与 debug-enabled、EVAL_DEBUG、token 同时满足）
      # 例：allow-cidrs: [ "127.0.0.1/32", "::1/128", "10.0.0.0/8" ]；留空或不写则不按 IP 限制
      allow-cidrs: []
      # 仅在反向代理可信地写入 X-Forwarded-For 时开启；直连场景勿开，避免客户端伪造 IP 绕过 allowlist
      trust-forwarded-headers: ${VAGENT_EVAL_API_TRUST_FORWARDED_HEADERS:false}
      # 与 eval membership.top-n 对齐；可被请求头 X-Eval-Membership-Top-N 覆盖
      membership-top-n: ${VAGENT_EVAL_API_MEMBERSHIP_TOP_N:8}
      # 以下为可选门控（已弃用；优先用 vagent.rag.gate.low-confidence-*，未设时仍读此处作回退）
      # low-confidence-cosine-distance-threshold: 0.45
      # low-confidence-query-substrings: []
      # P0+ B 线：检索前安全/拒答短路（EvalChatSafetyGate）。为 true 时同时作用于 POST /api/v1/eval/chat 与 RAG 开启时的 SSE 主链路（命中前短路；命中后规则见 vagent.rag.gate）
      safety-rules-enabled: ${VAGENT_EVAL_API_SAFETY_RULES_ENABLED:true}
      # 为 true 时：eval/chat 在未门控短路且为 answer 路径下调用 LLM 写真实 answer（依赖 vagent.llm.*，有成本）；默认 false
      full-answer-enabled: ${VAGENT_EVAL_API_FULL_ANSWER:false}
      # full-answer 为 true 时 LLM 聚合最长等待（毫秒），范围 1000–600000
      full-answer-timeout-ms: ${VAGENT_EVAL_API_FULL_ANSWER_TIMEOUT_MS:120000}
      # tool_policy=stub 时的进程内桩工具；关则 capabilities.tools.supported=false（工具题 SKIPPED_UNSUPPORTED）
      stub-tools-enabled: ${VAGENT_EVAL_API_STUB_TOOLS_ENABLED:true}
      # 仅 tool_policy=stub 进程内桩；real MCP 见 vagent.mcp.tool-call-timeout
      stub-tool-timeout-ms: ${VAGENT_EVAL_API_STUB_TOOL_TIMEOUT_MS:5000}
      stub-tool-circuit-failure-threshold: ${VAGENT_EVAL_API_STUB_TOOL_CIRCUIT_FAILURES:5}
      stub-tool-circuit-open-seconds: ${VAGENT_EVAL_API_STUB_TOOL_CIRCUIT_OPEN_SEC:30}
      # 桩工具结构化输出是否做 JSON Schema 校验（classpath:/eval/stub-schemas/*.schema.json）
      stub-tool-json-schema-validation-enabled: ${VAGENT_EVAL_API_STUB_TOOL_JSON_SCHEMA:true}
  # M5：检索前改写 + 规则意图（寒暄/澄清/RAG）；详见 docs/M5-实现说明.md
  orchestration:
    intent-enabled: true
    rewrite-strategy: passthrough
    concat-max-user-segments: 3
    clarification-min-chars: 3
    system-dialog-prefixes: "你好,嗨,hi,hello,谢谢,再见,在吗,早上好,晚安"
    clarification-template: "您的描述较简短，请补充具体场景或关键词（例如涉及哪条流程、哪个系统），方便我准确回答。"
    # U7：显式“工具意图”（推荐用 tool=xxx 或 /tool xxx 触发；关键词仅作兜底），默认关闭
    tool-intent-enabled: false
    tool-intent-keywords: "mcp,tool,工具,调用工具"
    tool-intent-default-tool-name: echo
  # M4：多轮 + 检索编排（测试 profile 默认关闭，因 H2 未加载向量表）
  rag:
    enabled: true
    top-k: 5
    max-history-messages: 20
    # U3：RAG 分支检索无命中时 no-llm=不调 LLM（固定文案+done）；allow-llm=仍调 LLM（与旧版一致）
    empty-hits-behavior: allow-llm
    # empty-hits-no-llm-message: 自定义 no-llm 时推送的固定全文（可选）
    # U5：第二路全表向量（跨租户）；生产默认关闭，见 docs/U5-实现说明.md
    second-path:
      enabled: false
      cross-tenant: false
      top-k: 5
      trigger-on-empty: true
      min-primary-hits-below: 1
      min-query-length: 0
    # P1-0b：混合检索 + 可选 rerank（默认全关；见 plans/vagent-upgrade.md）
    hybrid:
      enabled: false
      # ilike：子串 ILIKE（默认）；tsvector：PG 全文检索；bm25：第二检索系统（Lucene BM25）
      lexical-mode: ilike
      lexical-top-k: 20
      rrf-k: 60
    rerank:
      enabled: false
      timeout-ms: 800
      max-candidates: 20
      allow-external: false
    # P1-0：检索后低置信门控的默认行为与规则集合（用于 SSE + Eval 对齐；默认保持 clarify 行为）
    # low-confidence-behavior: deny | clarify | allow-llm
    # low-confidence-rule-set: query_too_short,weak_top_hit_distance,vague_query_reference
    low-confidence-behavior: ${VAGENT_RAG_LOW_CONFIDENCE_BEHAVIOR:clarify}
    low-confidence-rule-set: ${VAGENT_RAG_LOW_CONFIDENCE_RULE_SET:query_too_short,weak_top_hit_distance,vague_query_reference}
    # 可选：用户 RAG SSE 首帧 meta.retrieval_hit_id_hashes（k_case 与评测 X-Eval-Token 不同源）；不设则列表为 []
    sse-membership-hmac-secret: ${VAGENT_RAG_SSE_MEMBERSHIP_HMAC_SECRET:}
    # P1-0：检索后低置信门控（SSE + Eval 共用）；优先于 vagent.eval.api 下同义键（后者为兼容回退）
    gate:
      # low-confidence-cosine-distance-threshold: 0.45
      # low-confidence-query-substrings: []
  # U6：MCP（独立 Python Server，HTTP）。默认关闭；启用后可用 /api/v1/mcp/* 联调工具列表与调用。
  mcp:
    enabled: false
    base-url: http://127.0.0.1:8766/mcp
    token: ${MCP_TOKEN:}
    protocol-version: 2025-03-26
    # tools/call 单次 HTTP 超时；SSE 主链路与 eval tool_policy=real 共用（见 HttpMcpClient）
    tool-call-timeout: 3s
    # D-3：工具失败（尤其 schema 校验失败）后的对话策略：clarify | fallback
    tool-fail-behavior: ${VAGENT_MCP_TOOL_FAIL_BEHAVIOR:clarify}
    # U7：主链路工具调用白名单（逗号分隔）。为空则主链路不允许任何工具（仍可用 /api/v1/mcp/* 联调）。
    allowed-tools: echo,ping
    # D-7：在 echo/ping 外追加 ToolRegistry（须已有 /mcp/tool-arg-schemas/<key>.schema.json 与 tool-result-schemas）
    registry-tools: []
    #  - name: my_tool
    #    version: 1.0.0
    #    arg-schema-key: my_tool
    #    result-schema-key: my_tool
    #    result-schema-required: true
    # D-6：MCP callTool 前进程内配额（固定窗口；多实例各算各的）。默认关闭；在入参 schema 通过后扣减。
    quota:
      enabled: false
      window: 1m
      max-invocations-per-user-per-tool-per-window: 60
      # 0 = 不按会话限制；SSE 有 conversationId 时可设正数
      max-invocations-per-conversation-per-tool-per-window: 0
  llm:
    # noop | fake-stream | dashscope（通义千问兼容模式，需密钥）
    provider: noop
    default-model: ""
    fake-stream-chunk-size: 4
    fake-stream-chunk-delay-ms: 25
    # U1：仅当 provider=dashscope 生效；密钥务必用环境变量注入
    dashscope:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:}
      chat-model: qwen3.5-plus
  # 嵌入维度须与 schema-vector.sql 中 vector(N)、KbChunkMapper 中 CAST 一致；U2 默认 1024（text-embedding-v3）
  embedding:
    provider: hash
    dimensions: 1024
    dashscope:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:}
      model: text-embedding-v3
    chunk-max-chars: 512
    chunk-overlap: 64
  security:
    jwt:
      # 生产务必用环境变量覆盖；此处默认仅本地开发（勿用于公网）
      secret: ${VAGENT_SECURITY_JWT_SECRET:0123456789abcdef0123456789abcdef}
      expiration-seconds: 86400
      # 生产建议 false：sub 对应用户不存在时直接 401，要求重新登录（避免用户名被他人注册后旧 Token 误绑）
      remap-subject-by-username-when-user-missing: false
    cors:
      # 生产请改为具体域名（见 application-prod.yml）；* 仅开发便利
      allowed-origin-patterns:
        - "*"
