# =============================================================================
# Vagent 应用配置（M0–M5 + U1–U5；详见 docs/Mx-实现说明.md、docs/U1-实现说明.md 等）
# =============================================================================
# 本地需先创建库与用户，并授权 schema public（见 README）；测试用 test profile + H2，不依赖本机 PG。

server:
  port: 8080

logging:
  pattern:
    # U4：控制台日志带 MDC traceId（由 TraceIdMdcFilter 注入）
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%X{traceId:-}] %logger{36} - %m%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/ragent
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      # 生产与本地 PG：DDL 由 Flyway 执行；勿与 migration 重复跑 spring.sql.init
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

vagent:
  # M5：检索前改写 + 规则意图（寒暄/澄清/RAG）；详见 docs/M5-实现说明.md
  orchestration:
    intent-enabled: true
    rewrite-strategy: passthrough
    concat-max-user-segments: 3
    clarification-min-chars: 3
    system-dialog-prefixes: "你好,嗨,hi,hello,谢谢,再见,在吗,早上好,晚安"
    clarification-template: "您的描述较简短，请补充具体场景或关键词（例如涉及哪条流程、哪个系统），方便我准确回答。"
    # U7：显式“工具意图”（推荐用 tool=xxx 或 /tool xxx 触发；关键词仅作兜底），默认关闭
    tool-intent-enabled: false
    tool-intent-keywords: "mcp,tool,工具,调用工具"
    tool-intent-default-tool-name: echo
  # M4：多轮 + 检索编排（测试 profile 默认关闭，因 H2 未加载向量表）
  rag:
    enabled: true
    top-k: 5
    max-history-messages: 20
    # U3：RAG 分支检索无命中时 no-llm=不调 LLM（固定文案+done）；allow-llm=仍调 LLM（与旧版一致）
    empty-hits-behavior: allow-llm
    # empty-hits-no-llm-message: 自定义 no-llm 时推送的固定全文（可选）
    # U5：第二路全表向量（跨租户）；生产默认关闭，见 docs/U5-实现说明.md
    second-path:
      enabled: false
      cross-tenant: false
      top-k: 5
      trigger-on-empty: true
      min-primary-hits-below: 1
      min-query-length: 0
  # U6：MCP（独立 Python Server，HTTP）。默认关闭；启用后可用 /api/v1/mcp/* 联调工具列表与调用。
  mcp:
    enabled: false
    base-url: http://127.0.0.1:8766/mcp
    token: ${MCP_TOKEN:}
    protocol-version: 2025-03-26
    # U7：主链路工具调用白名单（逗号分隔）。为空则主链路不允许任何工具（仍可用 /api/v1/mcp/* 联调）。
    allowed-tools: echo,ping
  llm:
    # noop | fake-stream | dashscope（通义千问兼容模式，需密钥）
    provider: noop
    default-model: ""
    fake-stream-chunk-size: 4
    fake-stream-chunk-delay-ms: 25
    # U1：仅当 provider=dashscope 生效；密钥务必用环境变量注入
    dashscope:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:}
      chat-model: qwen3.5-plus
  # 嵌入维度须与 schema-vector.sql 中 vector(N)、KbChunkMapper 中 CAST 一致；U2 默认 1024（text-embedding-v3）
  embedding:
    provider: hash
    dimensions: 1024
    dashscope:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:}
      model: text-embedding-v3
    chunk-max-chars: 512
    chunk-overlap: 64
  security:
    jwt:
      secret: "0123456789abcdef0123456789abcdef"
      expiration-seconds: 86400
