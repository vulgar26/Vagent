# =============================================================================
# Vagent 应用配置（M0：端口、LLM；M1：PostgreSQL + JWT；M2：pgvector；M3：SSE 流式）
# =============================================================================
# 本地需先创建库与用户，并授权 schema public（见 README）；测试用 test profile + H2，不依赖本机 PG。

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vagent
    username: vagent
    password: vagent
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      # 开发期执行 DDL；生产建议 never + Flyway/Liquibase（向量扩展需超级用户先装一次）
      mode: always
      schema-locations:
        - classpath:schema-core.sql
        - classpath:schema-vector.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

vagent:
  llm:
    # noop | fake-stream（本地分块演示，不调用外网）
    provider: noop
    default-model: ""
    fake-stream-chunk-size: 4
    fake-stream-chunk-delay-ms: 25
  # 嵌入维度须与 schema-vector.sql 中 vector(N) 一致；hash 为可复现占位实现
  embedding:
    provider: hash
    dimensions: 128
    chunk-max-chars: 512
    chunk-overlap: 64
  security:
    jwt:
      secret: "0123456789abcdef0123456789abcdef"
      expiration-seconds: 86400
