# =============================================================================
# Vagent 应用配置（M0–M5 + U1 千问；详见 docs/Mx-实现说明.md、docs/U1-实现说明.md）
# =============================================================================
# 本地需先创建库与用户，并授权 schema public（见 README）；测试用 test profile + H2，不依赖本机 PG。

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vagent
    username: vagent
    password: vagent
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      # 开发期执行 DDL；生产建议 never + Flyway/Liquibase（向量扩展需超级用户先装一次）
      mode: always
      schema-locations:
        - classpath:schema-core.sql
        - classpath:schema-vector.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

vagent:
  # M5：检索前改写 + 规则意图（寒暄/澄清/RAG）；详见 docs/M5-实现说明.md
  orchestration:
    intent-enabled: true
    rewrite-strategy: passthrough
    concat-max-user-segments: 3
    clarification-min-chars: 3
    system-dialog-prefixes: "你好,嗨,hi,hello,谢谢,再见,在吗,早上好,晚安"
    clarification-template: "您的描述较简短，请补充具体场景或关键词（例如涉及哪条流程、哪个系统），方便我准确回答。"
  # M4：多轮 + 检索编排（测试 profile 默认关闭，因 H2 未加载向量表）
  rag:
    enabled: true
    top-k: 5
    max-history-messages: 20
  llm:
    # noop | fake-stream | dashscope（通义千问兼容模式，需密钥）
    provider: noop
    default-model: ""
    fake-stream-chunk-size: 4
    fake-stream-chunk-delay-ms: 25
    # U1：仅当 provider=dashscope 生效；密钥务必用环境变量注入
    dashscope:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:}
      chat-model: qwen-turbo
  # 嵌入维度须与 schema-vector.sql 中 vector(N) 一致；hash 为可复现占位实现
  embedding:
    provider: hash
    dimensions: 128
    chunk-max-chars: 512
    chunk-overlap: 64
  security:
    jwt:
      secret: "0123456789abcdef0123456789abcdef"
      expiration-seconds: 86400
