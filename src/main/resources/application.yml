# =============================================================================
# Vagent 应用配置（M0：运行端口、健康检查、LLM；M1：PostgreSQL + MyBatis-Plus + JWT）
# =============================================================================
# 本地需先创建库与用户，并授权 schema public（见 README）；测试用 test profile + H2，不依赖本机 PG。

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vagent
    username: vagent
    password: vagent
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      # 开发期执行 classpath:schema.sql；生产建议 never + Flyway/Liquibase
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

vagent:
  llm:
    provider: noop
    default-model: ""
  security:
    jwt:
      secret: "0123456789abcdef0123456789abcdef"
      expiration-seconds: 86400
