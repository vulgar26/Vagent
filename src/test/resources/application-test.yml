# test profile：H2 模拟 PostgreSQL，仅加载核心业务表（无 pgvector / CREATE EXTENSION）。
# M4：集成测试不走向量检索，故关闭 RAG；否则会调用 kb_chunks 相关 Mapper 而缺表失败。
vagent:
  rag:
    enabled: false

spring:
  mvc:
    async:
      request-timeout: 120000
  datasource:
    url: jdbc:h2:mem:vagent_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-core.sql
