# test profile：H2 模拟 PostgreSQL，执行与主工程相同的 schema.sql，无需本机 PostgreSQL。
spring:
  datasource:
    url: jdbc:h2:mem:vagent_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
