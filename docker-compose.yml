# 本地 PostgreSQL + pgvector，与 application.yml 默认库名/账号一致（ragent / postgres）。
# 使用：docker compose up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vagent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragent"]
      interval: 5s
      timeout: 5s
      retries: 5
