name: ci

on:
  pull_request:
  push:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Eval API smoke tests (com.vagent.eval)
        run: ./mvnw -B test -P eval-smoke

      - name: Remaining unit tests (exclude eval package)
        if: success()
        run: ./mvnw -B test -P skip-eval-in-ci

