# 连接「公网或 runner 可达」的 vagent-eval，发起一次全量 run（见 plans/ci-eval-github-actions.md）。
# 未配置 EVAL_BASE_URL 时跳过远程步骤，不把 job 标红。

name: eval-remote

on:
  workflow_dispatch:
  schedule:
    # 北京时间约 10:15；可按团队习惯修改
    - cron: "15 2 * * *"

jobs:
  remote-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remote eval (optional)
        id: remote_eval
        env:
          EVAL_BASE_URL: ${{ secrets.EVAL_BASE_URL }}
          EVAL_HTTP_TOKEN: ${{ secrets.EVAL_HTTP_TOKEN }}
          EVAL_RUN_PAYLOAD_JSON: ${{ secrets.EVAL_RUN_PAYLOAD_JSON }}
        run: |
          if [ -z "$EVAL_BASE_URL" ] || [ -z "$EVAL_RUN_PAYLOAD_JSON" ]; then
            echo "Secrets EVAL_BASE_URL / EVAL_RUN_PAYLOAD_JSON not set — skipping remote eval."
            echo "See plans/ci-eval-github-actions.md for setup (public eval URL, self-hosted runner, or tunnel)."
            exit 0
          fi
          chmod +x scripts/ci-eval-remote.sh
          ./scripts/ci-eval-remote.sh

      - name: Upload eval report (when produced)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-remote-report
          path: eval-remote-report.json
          if-no-files-found: ignore
